<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブラックジャック</title>
    <link rel="stylesheet" href="game.css">
    <link rel="stylesheet" href="gamestart.css">
    <link rel="stylesheet" href="tip.css">
</head>
<body>
    <div class="container">
        <!-- ゲームスタートボタン -->
        <div id="startScreen" class="screen active">
            <button id="startButton" class="start-button">ゲームスタート</button>
        </div>

        <!-- 掛け金決定パネル -->
        <div id="bettingScreen" class="screen">
            <div class="betting-panel">
                <h2>賭け金を決めてください</h2>
                
                <div class="betting-controls">
                    <!-- スライダー -->
                    <div class="slider-container">
                        <label for="betSlider">スライダー:</label>
                        <input 
                            type="range" 
                            id="betSlider" 
                            class="bet-slider" 
                            min="10" 
                            max="1000" 
                            value="100"
                            step="10"
                        >
                        <div class="slider-labels">
                            <span>10</span>
                            <span>500</span>
                            <span>1000</span>
                        </div>
                    </div>

                    <!-- スピナー（矢印付き数値入力） -->
                    <div class="spinner-container">
                        <label for="betSpinner">金額:</label>
                        <input 
                            type="number" 
                            id="betSpinner" 
                            class="bet-spinner" 
                            min="10" 
                            max="1000" 
                            value="100"
                            step="10"
                        >
                    </div>
                </div>

                <!-- 現在の掛け金表示 -->
                <div class="current-bet">
                    <span>現在の掛け金: ¥</span>
                    <span id="currentBetAmount">100</span>
                </div>

                <!-- 確定ボタン -->
                <button id="confirmButton" class="confirm-button">確定</button>
            </div>
        </div>

        <!-- ゲーム画面 -->
        <div id="gameScreen" class="screen">
            <div class="game-board">
                <button id="settingsButton" class="settings-button">設定</button>
                <div class="side-action">→</div>

                <div class="dealer-area">
                    <div class="info-pill">ディーラ</div>
                    <div class="dealer-cards">
                        <div class="card card-front" id="dealerCardFront">表</div>
                        <div class="card card-back" id="dealerCardBack">裏</div>
                    </div>
                    <div class="number-panel">
                        <span class="number-label">今の数字</span>
                        <span class="number-value" id="dealerScore">--</span>
                    </div>
                </div>

                <div class="deck-area">
                    <div class="deck-card">山札</div>
                </div>

                <div class="player-area">
                    <div class="player-header">
                        <div class="player-name" id="playerName">名前</div>
                        <div class="player-total">
                            <span>今の数字</span>
                            <strong id="playerScore">--</strong>
                        </div>
                        <div class="chip-pill">チップ</div>
                    </div>

                    <div class="player-cards">
                        <div class="card card-front" id="playerCardFront">自分だけ表</div>
                        <div class="card card-back" id="playerCardBack">自分だけ裏</div>
                    </div>

                    <div class="player-actions">
                        <button id="hitButton" class="game-control">ヒット</button>
                        <button id="standButton" class="game-control secondary">スタンド</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
