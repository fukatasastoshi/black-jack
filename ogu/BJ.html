<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブラックジャック - Black Jack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="casino-table">
        <div class="table-top">
            <h1>🎰 BLACK JACK 🎰</h1>
        </div>

        <!-- ディーラーエリア -->
        <div class="dealer-zone">
            <div class="dealer-area">
                <div class="dealer-label">DEALER</div>
                <div class="dealer-info">
                    <span class="score-label">Score:</span>
                    <span id="dealer-score" class="dealer-score">?</span>
                </div>
                <div id="dealer-hand" class="hand dealer-hand"></div>
            </div>
        </div>

        <!-- プレイヤーシート -->
        <div class="players-zone">
            <!-- プレイヤー1（メイン） -->
            <div class="player-seat active-player">
                <div class="player-label">YOU</div>
                <div class="player-info">
                    <div class="chip-display">💰 <span id="chips">1000</span></div>
                    <div class="games-display">試合: <span id="games-played">0</span>回</div>
                    <div class="wins-display">勝利: <span id="games-won">0</span>回</div>
                    <div class="winrate-display">勝率: <span id="win-rate">0</span>%</div>
                    <div class="bet-display" id="bet-display" style="display:none;">
                        Bet: <span id="current-bet">0</span>
                    </div>
                </div>
                <div id="player-hand" class="hand player-hand"></div>
                <div class="score-display">
                    Score: <span id="player-score">0</span>
                </div>
                <div class="player-controls">
                    <div class="betting-panel" id="betting-panel">
                        <input type="number" id="bet-amount" min="10" max="1000" value="100" placeholder="Bet">
                        <button onclick="placeBet()" id="bet-btn">BET</button>
                    </div>
                    <div class="game-controls" id="game-controls" style="display:none;">
                        <button id="hit-btn" onclick="hit()" disabled>ヒット</button>
                        <button id="stand-btn" onclick="stand()" disabled>スタンド</button>
                        <button id="double-btn" onclick="doubleDown()" disabled>ダブル</button>
                    </div>
                </div>
            </div>

            <!-- その他のプレイヤー（装飾用） -->
            <div class="player-seat empty-seat">
                <div class="player-label">PLAYER 2</div>
                <div class="empty-message">-</div>
            </div>

            <div class="player-seat empty-seat">
                <div class="player-label">PLAYER 3</div>
                <div class="empty-message">-</div>
            </div>
        </div>

        <!-- メッセージエリア -->
        <div class="message-zone">
            <p id="message">チップを賭えてゲームを開始してください</p>
        </div>

        <!-- リセットボタン -->
        <div class="bottom-controls">
            <button id="reset-btn" onclick="resetGame()" class="reset-button">NEW GAME</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
